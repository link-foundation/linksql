name: Broken Link Checker

on:
  push:
    branches:
      - main
    paths:
      - '**.md'
      - '**.html'
      - '.github/workflows/links.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.md'
      - '**.html'
      - '.github/workflows/links.yml'
  workflow_dispatch:

jobs:
  link-checker:
    name: Check Links
    runs-on: ubuntu-latest
    # Typical run: <1min with lychee cache. 10min prevents slow
    # external hosts or Wayback Machine probes from hanging the workflow.
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Check links with lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Check all Markdown and HTML files
          # Exclude case-studies directory - these are research documents from
          # external repos with references to files and issues that don't exist
          # in this repository (similar exclusion pattern as eslint.config.js)
          #
          # Exclude the Vite universal-app entry HTML: its `/favicon.svg` and
          # `/src/main.js` are root-relative build-time virtual paths that
          # resolve against the app's own web root (public/), not the repo
          # root, so lychee cannot statically resolve them.
          args: >-
            --verbose
            --no-progress
            --cache
            --max-cache-age 1d
            --max-retries 3
            --timeout 30
            --exclude-path docs/case-studies
            --exclude-path js/examples/universal-app/index.html
            './**/*.md'
            './**/*.html'
          # Fail the workflow if broken links are detected. Known false
          # positives can be added to .lycheeignore.
          fail: true
          # Write a job summary
          jobSummary: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
